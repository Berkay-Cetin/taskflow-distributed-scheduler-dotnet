version: '3.9'

networks:
  taskflow-net:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  kafka-data:
  rabbitmq-data:

services:

  # ─────────────────────────────────────────
  # POSTGRESQL
  # ─────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: taskflow-postgres
    restart: unless-stopped
    networks:
      - taskflow-net
    ports:
      - "5433:5432"   # 5432 TradePulse'da kullanılıyor
    environment:
      POSTGRES_USER: taskflow
      POSTGRES_PASSWORD: taskflow123
      POSTGRES_DB: taskflow
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taskflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # REDIS
  # ─────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: taskflow-redis
    restart: unless-stopped
    networks:
      - taskflow-net
    ports:
      - "6380:6379"   # 6379 TradePulse'da kullanılıyor
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # ZOOKEEPER
  # ─────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: taskflow-zookeeper
    restart: unless-stopped
    networks:
      - taskflow-net
    environment:
      ZOOKEEPER_CLIENT_PORT: 2182
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2182"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # KAFKA
  # ─────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: taskflow-kafka
    restart: unless-stopped
    networks:
      - taskflow-net
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9093:9093"
      - "29093:29093"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2182
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29093,PLAINTEXT_HOST://localhost:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29093,PLAINTEXT_HOST://0.0.0.0:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9093"]
      interval: 15s
      timeout: 10s
      retries: 10

  # ─────────────────────────────────────────
  # KAFKA INIT — Topic'leri oluştur
  # ─────────────────────────────────────────
  kafka-init:
    image: confluentinc/cp-kafka:7.6.0
    container_name: taskflow-kafka-init
    networks:
      - taskflow-net
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command: |
      "
      kafka-topics --bootstrap-server kafka:29093 --create --if-not-exists \
        --topic task.trigger --partitions 3 --replication-factor 1

      kafka-topics --bootstrap-server kafka:29093 --create --if-not-exists \
        --topic task.result --partitions 3 --replication-factor 1

      kafka-topics --bootstrap-server kafka:29093 --create --if-not-exists \
        --topic task.deadletter --partitions 1 --replication-factor 1

      echo 'Topics oluşturuldu:'
      kafka-topics --bootstrap-server kafka:29093 --list
      "

  # ─────────────────────────────────────────
  # RABBITMQ
  # ─────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: taskflow-rabbitmq
    restart: unless-stopped
    networks:
      - taskflow-net
    ports:
      - "5673:5672"    # AMQP
      - "15673:15672"  # Management UI
    environment:
      RABBITMQ_DEFAULT_USER: taskflow
      RABBITMQ_DEFAULT_PASS: taskflow123
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ─────────────────────────────────────────
  # KAFKA UI
  # ─────────────────────────────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: taskflow-kafka-ui
    restart: unless-stopped
    networks:
      - taskflow-net
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8082:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: taskflow
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29093